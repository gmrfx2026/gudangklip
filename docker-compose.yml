services:
  postgres:
    image: postgres:16-alpine
    container_name: gudangklip-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: gudangklip
      POSTGRES_PASSWORD: gudangklip123
      POSTGRES_DB: gudangklip
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
